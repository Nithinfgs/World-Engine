<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="https://cdn.jsdelivr.net/npm/lucide-static@0.471.1/icons/globe.svg" />

    <title>World Engine — Digital Twin of Earth</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Outfit:wght@100..900&family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Outfit', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            }
          }
        }
      }
    </script>    <style>
      /* World Engine HUD Theme Styles (Dark Operations Center Edition) */
      :root {
        /* Colors */
        --bg-color: #0A0E17;      /* Deep Obsidian Space Black */
        --panel-bg: rgba(15, 23, 42, 0.75); /* Frosted Slate-900 Glass */
        --card-bg: rgba(30, 41, 59, 0.85);  /* Dark Surface Cards */
        --glass-bg: rgba(15, 23, 42, 0.8);  /* Glassmorphism slate fill */
        --glass-border: rgba(255, 255, 255, 0.08); /* Minimal glow border */
        
        --primary: #3B82F6;       /* Glowing Neon Blue */
        --secondary: #14B8A6;     /* Glowing Copper Teal */
        --ai-purple: #8B5CF6;     /* AI Violet */
        --success: #10B981;       /* Success emerald */
        --warning: #F59E0B;       /* Warning amber */
        --danger: #EF4444;        /* Danger red */
        --highlight: #F8FAFC;     /* Slate-50 bright text */
        --text-muted: #94A3B8;    /* Muted blue-grey */
        
        /* Fonts */
        --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
        --font-display: 'Outfit', sans-serif;
        --font-mono: 'JetBrains Mono', monospace;

        font-family: var(--font-sans);
        background-color: var(--bg-color);
        color: var(--highlight);
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        overflow: hidden;
        user-select: none;
        -webkit-font-smoothing: antialiased;
      }

      *, *::before, *::after {
        box-sizing: inherit;
      }

      body {
        margin: 0;
        width: 100vw;
        height: 100vh;
        background-color: var(--bg-color);
        overflow: hidden;
      }

      /* Scrollbars */
      ::-webkit-scrollbar {
        width: 4px;
        height: 4px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.2);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--glass-border);
        border-radius: 2px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--primary);
      }

      /* Glassmorphism Panel styles */
      .hud-panel {
        background: var(--glass-bg);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
      }

      .hud-panel-glow-blue {
        box-shadow: 0 0 20px rgba(59, 130, 246, 0.15);
        border-color: rgba(59, 130, 246, 0.25);
      }

      .hud-panel-glow-purple {
        box-shadow: 0 0 20px rgba(139, 92, 246, 0.15);
        border-color: rgba(139, 92, 246, 0.25);
      }

      /* Layout containers */
      #root {
        width: 100vw;
        height: 100vh;
        position: relative;
        display: grid;
        grid-template-rows: 64px 1fr 80px;
        grid-template-columns: 280px 1fr 340px;
        grid-template-areas:
          "top top top"
          "left center right"
          "bottom bottom bottom";
      }

      /* Animations */
      @keyframes pulse-dot {
        0% {
          transform: scale(0.85);
          opacity: 0.5;
        }
        50% {
          transform: scale(1.15);
          opacity: 1;
          box-shadow: 0 0 8px currentColor;
        }
        100% {
          transform: scale(0.85);
          opacity: 0.5;
        }
      }

      .pulse-active {
        animation: pulse-dot 2s infinite ease-in-out;
      }

      @keyframes spin-slow {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .spin-slow {
        animation: spin-slow 120s linear infinite;
      }

      @keyframes scanline {
        0% {
          transform: translateY(-100%);
        }
        100% {
          transform: translateY(100%);
        }
      }

      .scanlines::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          rgba(255, 255, 255, 0) 50%,
          rgba(200, 190, 175, 0.12) 50%
        );
        background-size: 100% 4px;
        z-index: 999;
        pointer-events: none;
      }

      /* Typography styles */
      h1, h2, h3, h4 {
        font-family: var(--font-display);
        margin: 0;
        font-weight: 600;
        letter-spacing: -0.02em;
      }

      .font-mono {
        font-family: var(--font-mono);
      }

      .text-gradient-cyan {
        background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .text-gradient-purple {
        background: linear-gradient(135deg, #A78BFA 0%, var(--ai-purple) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      /* Shake Animation for Tectonic alerts */
      @keyframes shake {
        0%, 100% { transform: translate(0, 0) rotate(0deg); }
        10% { transform: translate(-3px, -2px) rotate(-0.5deg); }
        20% { transform: translate(-4px, 0px) rotate(0.5deg); }
        30% { transform: translate(0px, 3px) rotate(0deg); }
        40% { transform: translate(2px, -2px) rotate(0.5deg); }
        50% { transform: translate(-2px, 3px) rotate(-0.5deg); }
        60% { transform: translate(-4px, 1px) rotate(0deg); }
        70% { transform: translate(3px, 2px) rotate(-0.5deg); }
        80% { transform: translate(-2px, -2px) rotate(0.5deg); }
        90% { transform: translate(3px, 3px) rotate(0deg); }
      }

      .shake-active {
        animation: shake 0.4s ease-in-out infinite;
      }

      /* Custom Glass range sliders styling */
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--secondary);
        box-shadow: 0 0 10px var(--secondary);
        cursor: pointer;
        transition: transform 0.1s;
      }

      input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.3);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="module">
      import React, { useState, useEffect, useRef, StrictMode } from 'https://esm.sh/react@19.0.0';
      import { createRoot } from 'https://esm.sh/react-dom@19.0.0/client';
      import * as THREE from 'https://esm.sh/three@0.172.0';
      import { 
        X, 
        Globe, 
        Plane, 
        Ship, 
        Orbit, 
        CloudRain, 
        Activity, 
        Grid3X3, 
        Cpu, 
        Brain, 
        Sliders, 
        Settings, 
        Search, 
        Globe2, 
        Play, 
        Pause, 
        ShieldAlert, 
        ArrowRight,
        AlertTriangle,
        Clock,
        Gauge,
        Terminal,
        Wifi,
        Sparkles,
        CornerDownLeft,
        Loader2,
        CheckCircle2,
        Heart
      } from 'https://esm.sh/lucide-react@0.471.1?deps=react@19.0.0';

      // ==========================================
      // 1. DATA TYPES & DATA CONTEXT
      // ==========================================

      const PRESET_QUERIES = [
        { text: 'Analyze European airspace delays', type: 'flights' },
        { text: 'Examine California thermal anomaly', type: 'weather' }
      ];

      const YEARS = [2015, 2020, 2026, 2030, 2035];

      const EVENTS = [
        { id: 'ev1', name: 'Japan Earthquake', type: 'seismic', lat: 38.268, lon: 140.869, zoom: 4.0, description: 'M 7.2 seismic tremor detected Tohoku fault line. Geology active.', layers: { earth: true, aviation: false, oceans: false, space: false, weather: false, geology: true, grid: true } },
        { id: 'ev2', name: 'SpaceX Falcon Launch', type: 'rocket', lat: 28.5728, lon: -80.649, zoom: 5.0, description: 'Falcon Heavy launch successful from Cape Canaveral LC-39A. Starlink downlink nominal.', layers: { earth: true, aviation: false, oceans: false, space: true, weather: false, geology: false, grid: true } },
        { id: 'ev3', name: 'Suez Canal Ship Queue', type: 'maritime', lat: 29.976, lon: 32.549, zoom: 4.5, description: 'Container vessel congestion active. Dwell delays: 3.2 days. Supply chain impact.', layers: { earth: true, aviation: false, oceans: true, space: false, weather: false, geology: false, grid: true } },
        { id: 'ev4', name: 'Mojave Deforestation Fire', type: 'fire', lat: 35.011, lon: -115.473, zoom: 4.2, description: 'Thermal plume expansion detected. Active forest wildfire over Mojave sector.', layers: { earth: true, aviation: false, oceans: false, space: false, weather: true, geology: true, grid: true } },
        { id: 'ev5', name: 'Munich Corridor Storm', type: 'weather', lat: 48.135, lon: 11.582, zoom: 4.0, description: 'Category 3 storm cells intersecting Munich slots. Wind speed: 80 km/h.', layers: { earth: true, aviation: true, oceans: false, space: false, weather: true, geology: false, grid: true } }
      ];

      const CITIES = [
        { name: 'London', lat: 51.5074, lon: -0.1278 },
        { name: 'New York', lat: 40.7128, lon: -74.0060 },
        { name: 'Tokyo', lat: 35.6762, lon: 139.6503 },
        { name: 'Sydney', lat: -33.8688, lon: 151.2093 },
        { name: 'Cape Town', lat: -33.9249, lon: 18.4241 },
        { name: 'Rio de Janeiro', lat: -22.9068, lon: -43.1729 },
        { name: 'Mumbai', lat: 19.0760, lon: 72.8777 },
        { name: 'Dubai', lat: 25.2048, lon: 55.2708 },
      ];

      const SENSORS = [
        { id: 'SEN-01', type: 'BUOY', lat: 15.0, lon: -130.0, name: 'NOAA PacBuoy 41', value: '23.4', unit: '°C Sea Temp' },
        { id: 'SEN-02', type: 'SEISMIC', lat: 36.3, lon: 138.2, name: 'Tokyo Seismo Grid B', value: '1.2', unit: 'M Tremor' },
        { id: 'SEN-03', type: 'WEATHER', lat: 52.1, lon: 4.9, name: 'KNMI NetherStation', value: '1013.2', unit: 'hPa Press' },
        { id: 'SEN-04', type: 'UPLINK', lat: 37.4, lon: -122.1, name: 'Starlink Ground Station SF', value: '482', unit: 'Mbps Band' },
        { id: 'SEN-05', type: 'CABLE', lat: 35.0, lon: 25.0, name: 'SEEMEWE Mediterranean node', value: '14', unit: 'ms Latency' },
      ];

      const LOG_TEMPLATES = [
        { source: 'AVIATION', severity: 'INFO', message: 'Flight BA286 (LHR -> HND) reached cruising altitude 35,000ft' },
        { source: 'AVIATION', severity: 'INFO', message: 'Flight AA100 (JFK -> LHR) filed trans-atlantic route segment C' },
        { source: 'AVIATION', severity: 'WARNING', message: 'Flight QF012 (SIN -> SYD) routing around weather sector J2' },
        { source: 'GEOLOGY', severity: 'INFO', message: 'Seismic monitoring station SLK: No abnormal vibrations detected' },
        { source: 'GEOLOGY', severity: 'ALERT', message: 'USGS alert: M 4.1 Earthquake detected 12km ENE of Tokyo, Japan' },
        { source: 'SPACE', severity: 'INFO', message: 'Starlink orbital group 5-11 orbital correction complete' },
        { source: 'SPACE', severity: 'INFO', message: 'ISS crew transits orbital boundary segment delta' },
        { source: 'SPACE', severity: 'WARNING', message: 'Solar wind density spike: satellite protective shielding engaged' },
        { source: 'WEATHER', severity: 'WARNING', message: 'Hurricane alert: Storm force vectors intensifying in South Atlantic' },
        { source: 'WEATHER', severity: 'INFO', message: 'Atmospheric moisture index peak: precipitation forecasted over Northern Europe' },
        { source: 'NETWORK', severity: 'INFO', message: 'BGP path update: Edge routing table optimized for Cloudflare APAC' },
        { source: 'NETWORK', severity: 'ALERT', message: 'CDNs detect localized high latency transit segments in Mediterranean cables' },
      ];

      function latLonToVector3(lat, lon, radius) {
        const phi = (90 - lat) * (Math.PI / 180);
        const theta = (lon + 180) * (Math.PI / 180);
        const x = -(radius * Math.sin(phi) * Math.sin(theta));
        const y = radius * Math.cos(phi);
        const z = radius * Math.sin(phi) * Math.cos(theta);
        return new THREE.Vector3(x, y, z);
      }

      // ==========================================
      // 2. EARTH GLOBE 3D VISUALIZER COMPONENT
      // ==========================================

      const EarthGlobe = ({ 
        activeLayers, 
        timeScale, 
        viewMode,
        cameraTarget,
        shakeIntensity,
        selectedYear,
        onSelectSensor,
        zoomRadiusRef
      }) => {
        const containerRef = useRef(null);
        const rendererRef = useRef(null);

        useEffect(() => {
          if (!containerRef.current) return;

          const width = containerRef.current.clientWidth;
          const height = containerRef.current.clientHeight;
          const scene = new THREE.Scene();
          
          const materialsToDispose = [];
          
          const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 150);
          camera.position.set(0, 0, 8);

          const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
          renderer.setSize(width, height);
          renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
          containerRef.current.appendChild(renderer.domElement);
          rendererRef.current = renderer;

          const mainGroup = new THREE.Group();
          scene.add(mainGroup);

          const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
          scene.add(ambientLight);

          const sunLight = new THREE.DirectionalLight(0xffffff, 2.0);
          sunLight.position.set(10, 5, 10);
          scene.add(sunLight);

          const globeGroup = new THREE.Group();
          mainGroup.add(globeGroup);

          const solarGroup = new THREE.Group();
          mainGroup.add(solarGroup);

          // --- BEIGE MODE STARFIELD ---
          const starCount = 800;
          const starPositions = [];
          const starColors = [];
          const goldColor = new THREE.Color(0xD6B85A);
          const silverColor = new THREE.Color(0xC5BEB4);
          for (let i = 0; i < starCount; i++) {
            const u = Math.random();
            const v = Math.random();
            const theta = u * 2.0 * Math.PI;
            const phi = Math.acos(2.0 * v - 1.0);
            const r = 40 + Math.random() * 20;
            const sx = r * Math.sin(phi) * Math.cos(theta);
            const sy = r * Math.sin(phi) * Math.sin(theta);
            const sz = r * Math.cos(phi);
            starPositions.push(sx, sy, sz);
            const color = Math.random() > 0.5 ? goldColor : silverColor;
            starColors.push(color.r, color.g, color.b);
          }
          const starGeo = new THREE.BufferGeometry();
          starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPositions, 3));
          starGeo.setAttribute('color', new THREE.Float32BufferAttribute(starColors, 3));
          const starMat = new THREE.PointsMaterial({
            size: 0.08,
            vertexColors: true,
            transparent: true,
            opacity: 0.45,
          });
          const starfield = new THREE.Points(starGeo, starMat);
          scene.add(starfield);
          materialsToDispose.push(starMat);

          // Glow Earth (Holographic core in Dark mode)
          const innerSphereGeo = new THREE.SphereGeometry(2.48, 32, 32);
          const innerSphereMat = new THREE.MeshBasicMaterial({
            color: 0x0A0E17,
            transparent: true,
            opacity: 0.85,
          });
          const innerSphere = new THREE.Mesh(innerSphereGeo, innerSphereMat);
          globeGroup.add(innerSphere);

          // Parallels Grid Wireframe (Glowing Teal in Dark mode)
          const gridGeo = new THREE.SphereGeometry(2.5, 24, 24);
          const gridMat = new THREE.MeshBasicMaterial({
            color: 0x14B8A6,
            wireframe: true,
            transparent: true,
            opacity: 0.18,
          });
          const gridMesh = new THREE.Mesh(gridGeo, gridMat);
          globeGroup.add(gridMesh);

          // Procedural Landmass Particle Matrix
          const mapWidth = 128;
          const mapHeight = 64;
          const mapCanvas = document.createElement('canvas');
          mapCanvas.width = mapWidth;
          mapCanvas.height = mapHeight;
          const ctx = mapCanvas.getContext('2d');
          if (ctx) {
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, mapWidth, mapHeight);
            ctx.fillStyle = '#ffffff';

            // Draw simple continents
            ctx.beginPath();
            ctx.moveTo(50, 15); ctx.lineTo(112, 12); ctx.lineTo(115, 35);
            ctx.lineTo(95, 42); ctx.lineTo(76, 40); ctx.lineTo(72, 32);
            ctx.lineTo(55, 28); ctx.closePath(); ctx.fill();

            ctx.beginPath();
            ctx.moveTo(56, 28); ctx.lineTo(72, 30); ctx.lineTo(70, 48);
            ctx.lineTo(60, 52); ctx.lineTo(54, 40); ctx.closePath(); ctx.fill();

            ctx.beginPath();
            ctx.moveTo(84, 32); ctx.lineTo(89, 32); ctx.lineTo(86, 38); ctx.closePath(); ctx.fill();

            ctx.beginPath();
            ctx.moveTo(15, 12); ctx.lineTo(44, 10); ctx.lineTo(48, 25);
            ctx.lineTo(34, 26); ctx.lineTo(26, 34); ctx.lineTo(18, 22); ctx.closePath(); ctx.fill();

            ctx.beginPath();
            ctx.moveTo(30, 34); ctx.lineTo(42, 34); ctx.lineTo(38, 56);
            ctx.lineTo(34, 56); ctx.lineTo(28, 42); ctx.closePath(); ctx.fill();

            ctx.beginPath();
            ctx.moveTo(38, 6); ctx.lineTo(46, 5); ctx.lineTo(43, 11);
            ctx.lineTo(38, 9); ctx.closePath(); ctx.fill();

            ctx.beginPath();
            ctx.moveTo(102, 44); ctx.lineTo(114, 44); ctx.lineTo(112, 52);
            ctx.lineTo(102, 52); ctx.closePath(); ctx.fill();

            ctx.fillRect(8, 58, 112, 4);
          }

          const pPoints = [];
          if (ctx) {
            const imgData = ctx.getImageData(0, 0, mapWidth, mapHeight);
            const data = imgData.data;
            for (let y = 0; y < mapHeight; y++) {
              for (let x = 0; x < mapWidth; x++) {
                const i = (y * mapWidth + x) * 4;
                if (data[i] > 128) {
                  const lon = (x / mapWidth) * 360 - 180;
                  const lat = 90 - (y / mapHeight) * 180;
                  pPoints.push(latLonToVector3(lat, lon, 2.5));
                }
              }
            }
          }

          const pointsGeo = new THREE.BufferGeometry().setFromPoints(pPoints);
          const pointsMat = new THREE.PointsMaterial({
            color: 0x3B82F6, // Glowing Neon Blue Dots
            size: 0.03,
            transparent: true,
            opacity: 0.85,
          });
          const pointsGlobe = new THREE.Points(pointsGeo, pointsMat);
          globeGroup.add(pointsGlobe);

          // Cities
          const cityGeo = new THREE.SphereGeometry(0.025, 16, 16);
          const cityMat = new THREE.MeshBasicMaterial({ color: 0x2563EB });
          materialsToDispose.push(cityMat);
          CITIES.forEach((city) => {
            const marker = new THREE.Mesh(cityGeo, cityMat);
            const pos = latLonToVector3(city.lat, city.lon, 2.5);
            marker.position.copy(pos);
            globeGroup.add(marker);
          });

          // Sensors
          const sensorGeo = new THREE.SphereGeometry(0.04, 16, 16);
          const sensorGroup = new THREE.Group();
          globeGroup.add(sensorGroup);

          const sensorMeshes = [];
          SENSORS.forEach((sen) => {
            const mat = new THREE.MeshBasicMaterial({ color: 0x22C55E });
            materialsToDispose.push(mat);
            const mesh = new THREE.Mesh(sensorGeo, mat);
            const pos = latLonToVector3(sen.lat, sen.lon, 2.52);
            mesh.position.copy(pos);
            mesh.userData = sen;
            sensorGroup.add(mesh);
            sensorMeshes.push(mesh);
          });

          // Flight routes
          const routesGroup = new THREE.Group();
          globeGroup.add(routesGroup);

          const planes = [];
          const planeGeo = new THREE.SphereGeometry(0.02, 8, 8);
          const planeMat = new THREE.MeshBasicMaterial({ color: 0x06B6D4 });

          for (let i = 0; i < 15; i++) {
            const c1 = CITIES[Math.floor(Math.random() * CITIES.length)];
            let c2 = CITIES[Math.floor(Math.random() * CITIES.length)];
            while (c1 === c2) {
              c2 = CITIES[Math.floor(Math.random() * CITIES.length)];
            }

            const p1 = latLonToVector3(c1.lat, c1.lon, 2.5);
            const p2 = latLonToVector3(c2.lat, c2.lon, 2.5);
            const midPoint = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);
            const dist = p1.distanceTo(p2);
            midPoint.normalize().multiplyScalar(2.5 + dist * 0.22);

            const curve = new THREE.QuadraticBezierCurve3(p1, midPoint, p2);
            const points = curve.getPoints(24);
            const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
            const lineMat = new THREE.LineBasicMaterial({
              color: 0x3B82F6,
              transparent: true,
              opacity: 0.2,
            });
            materialsToDispose.push(lineMat);
            const routeLine = new THREE.Line(lineGeo, lineMat);
            routesGroup.add(routeLine);

            const planeMesh = new THREE.Mesh(planeGeo, planeMat);
            routesGroup.add(planeMesh);
            planes.push({
              mesh: planeMesh,
              curve,
              speed: 0.06 + Math.random() * 0.08,
              progress: Math.random(),
            });
          }

          // Satellite orbits
          const spaceGroup = new THREE.Group();
          globeGroup.add(spaceGroup);

          const satellites = [];
          const satGeo = new THREE.BoxGeometry(0.03, 0.03, 0.03);
          const satMat = new THREE.MeshBasicMaterial({ color: 0x8B5CF6 });

          for (let i = 0; i < 12; i++) {
            const orbitRad = 3.1 + i * 0.18;
            const ringGeo = new THREE.RingGeometry(orbitRad - 0.005, orbitRad + 0.005, 64);
            const ringMat = new THREE.MeshBasicMaterial({
              color: 0x8B5CF6,
              side: THREE.DoubleSide,
              transparent: true,
              opacity: 0.08,
            });
            materialsToDispose.push(ringMat);
            const ring = new THREE.Mesh(ringGeo, ringMat);
            const rotationAxis = new THREE.Vector3(
              Math.random() - 0.5,
              Math.random() - 0.5,
              Math.random() - 0.5
            ).normalize();
            
            ring.rotateOnAxis(rotationAxis, Math.random() * Math.PI);
            spaceGroup.add(ring);

            const satMesh = new THREE.Mesh(satGeo, satMat);
            spaceGroup.add(satMesh);
            satellites.push({
              mesh: satMesh,
              radius: orbitRad,
              speed: 0.15 + Math.random() * 0.2,
              angle: Math.random() * Math.PI * 2,
              axis: rotationAxis,
            });
          }

          // Tectonic alert pulses
          const anomaliesGroup = new THREE.Group();
          globeGroup.add(anomaliesGroup);
          
          const anomalies = [];

          for (let i = 0; i < 4; i++) {
            const lat = -30 + Math.random() * 60;
            const lon = -120 + Math.random() * 240;
            const pos = latLonToVector3(lat, lon, 2.51);

            const ringGeo = new THREE.RingGeometry(0, 0.22, 32);
            const ringMat = new THREE.MeshBasicMaterial({
              color: i % 2 === 0 ? 0xEF4444 : 0xF59E0B,
              side: THREE.DoubleSide,
              transparent: true,
              opacity: 0.6,
            });
            materialsToDispose.push(ringMat);
            const anomalyMesh = new THREE.Mesh(ringGeo, ringMat);
            anomalyMesh.position.copy(pos);
            anomalyMesh.lookAt(new THREE.Vector3(0, 0, 0));
            anomalyMesh.rotateX(Math.PI / 2);

            anomaliesGroup.add(anomalyMesh);
            anomalies.push({
              mesh: anomalyMesh,

              scale: 0.1,

          // --- DETAILED 3D SOLAR SYSTEM (8 REAL PLANETS) ---
          const sunGeo = new THREE.SphereGeometry(0.7, 32, 32);
          const sunMat = new THREE.MeshBasicMaterial({ color: 0xEAB308 }); // glowing gold
          const sunMesh = new THREE.Mesh(sunGeo, sunMat);
          solarGroup.add(sunMesh);
          materialsToDispose.push(sunMat);

          const planetsData = [
            { name: 'mercury', radius: 1.3, size: 0.05, color: 0x8A8379, speed: 0.24 },
            { name: 'venus', radius: 1.8, size: 0.09, color: 0xDFD5C6, speed: 0.15 },
            { name: 'earth', radius: 2.5, size: 0.12, color: 0x2563EB, speed: 0.10, isEarth: true },
            { name: 'mars', radius: 3.2, size: 0.08, color: 0xDC2626, speed: 0.08 },
            { name: 'jupiter', radius: 4.3, size: 0.24, color: 0xCA8A04, speed: 0.04 },
            { name: 'saturn', radius: 5.6, size: 0.18, color: 0xEAB308, speed: 0.03, hasRings: true },
            { name: 'uranus', radius: 6.8, size: 0.14, color: 0x0D9488, speed: 0.02 },
            { name: 'neptune', radius: 7.8, size: 0.13, color: 0x1E3A8A, speed: 0.01 }
          ];

          const planetMeshes = [];

          planetsData.forEach((pd) => {
            // Draw Orbit Ring (Beige mode styled paths)
            const orbitGeo = new THREE.RingGeometry(pd.radius - 0.005, pd.radius + 0.005, 64);
            const orbitMat = new THREE.MeshBasicMaterial({ color: 0x78716C, side: THREE.DoubleSide, transparent: true, opacity: 0.12 });
            const orbitRing = new THREE.Mesh(orbitGeo, orbitMat);
            orbitRing.rotateX(Math.PI / 2);
            solarGroup.add(orbitRing);
            materialsToDispose.push(orbitMat);

            // Planet system group (handles moons relative rotation)
            const pGroup = new THREE.Group();
            solarGroup.add(pGroup);

            // Planet core mesh
            const pGeo = new THREE.SphereGeometry(pd.size, 16, 16);
            const pMat = new THREE.MeshBasicMaterial({ color: pd.color, wireframe: pd.isEarth });
            const pMesh = new THREE.Mesh(pGeo, pMat);
            pGroup.add(pMesh);
            materialsToDispose.push(pMat);

            let moonMesh = null;
            if (pd.isEarth) {
              const mGeo = new THREE.SphereGeometry(0.03, 8, 8);
              const mMat = new THREE.MeshBasicMaterial({ color: 0x78716C });
              moonMesh = new THREE.Mesh(mGeo, mMat);
              moonMesh.position.x = 0.24;
              pGroup.add(moonMesh);
              materialsToDispose.push(mMat);
            }

            if (pd.hasRings) {
              // Saturn tilted ring geometry
              const rGeo = new THREE.RingGeometry(pd.size * 1.3, pd.size * 2.3, 32);
              const rMat = new THREE.MeshBasicMaterial({ color: 0xD6B85A, side: THREE.DoubleSide, transparent: true, opacity: 0.55 });
              const rMesh = new THREE.Mesh(rGeo, rMat);
              rMesh.rotateX(Math.PI / 2.8);
              pGroup.add(rMesh);
              materialsToDispose.push(rMat);
            }

            planetMeshes.push({
              group: pGroup,
              mesh: pMesh,
              data: pd,
              angle: Math.random() * Math.PI * 2,
              moonMesh
            });
          });

          // Raycast Click Selection
          const raycaster = new THREE.Raycaster();
          const mouse = new THREE.Vector2();

          const handleMouseClick = (e) => {
            if (isDragging) return;

            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(sensorMeshes);

            if (intersects.length > 0) {
              onSelectSensor(intersects[0].object.userData);
            } else {
              onSelectSensor(null);
            }
          };

          // Drag Orbit rotations + Inertia variables
          let isDragging = false;
          let previousMousePosition = { x: 0, y: 0 };
          let dragMoveOffset = 0;
          let rotationVelocityX = 0;
          let rotationVelocityY = 0;

          const handleMouseDown = () => {
            isDragging = true;
            dragMoveOffset = 0;
            rotationVelocityX = 0;
            rotationVelocityY = 0;
          };

          const handleMouseMove = (e) => {
            const deltaMove = {
              x: e.offsetX - previousMousePosition.x,
              y: e.offsetY - previousMousePosition.y,
            };

            if (isDragging) {
              dragMoveOffset += Math.abs(deltaMove.x) + Math.abs(deltaMove.y);
              globeGroup.rotation.y += deltaMove.x * 0.005;
              globeGroup.rotation.x += deltaMove.y * 0.005;
              solarGroup.rotation.y += deltaMove.x * 0.003;

              rotationVelocityY = deltaMove.x * 0.04;
              rotationVelocityX = deltaMove.y * 0.04;
            }

            previousMousePosition = {
              x: e.offsetX,
              y: e.offsetY,
            };
          };

          const handleMouseUp = (e) => {
            if (dragMoveOffset < 5) {
              handleMouseClick(e);
            }
            isDragging = false;
          };

          const domEl = renderer.domElement;
          domEl.addEventListener('mousedown', handleMouseDown);
          domEl.addEventListener('mousemove', handleMouseMove);
          domEl.addEventListener('mouseup', handleMouseUp);

          // Custom Mouse Wheel Zoom listener
          const handleWheel = (e) => {
            e.preventDefault();
            const zoomSpeed = 0.005;
            zoomRadiusRef.current += e.deltaY * zoomSpeed;
            if (viewMode === 'solarsystem') {
              zoomRadiusRef.current = Math.max(6.0, Math.min(zoomRadiusRef.current, 25.0));
            } else {
              zoomRadiusRef.current = Math.max(3.2, Math.min(zoomRadiusRef.current, 16.0));
            }
          };
          domEl.addEventListener('wheel', handleWheel, { passive: false });

          // Animation frames
          const clock = new THREE.Clock();
          let earthOrbitAngle = 0;
          let marsOrbitAngle = Math.PI / 3;
          let moonOrbitAngle = 0;

          const animate = () => {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            const adjustedDelta = delta * timeScale;

            gridMesh.visible = activeLayers.grid;
            pointsGlobe.visible = activeLayers.earth;
            routesGroup.visible = activeLayers.aviation;
            sensorGroup.visible = activeLayers.grid;
            
            const satelliteLimit = selectedYear === 2015 ? 3 : selectedYear === 2020 ? 6 : 12;
            satellites.forEach((sat, idx) => {
              sat.mesh.visible = activeLayers.space && (idx < satelliteLimit);
            });
            spaceGroup.visible = activeLayers.space;
            anomaliesGroup.visible = activeLayers.weather || activeLayers.geology;

            globeGroup.visible = (viewMode === 'earth');
            solarGroup.visible = (viewMode === 'solarsystem');

            let shakeOffsetX = 0;
            let shakeOffsetY = 0;
            if (shakeIntensity > 0) {
              shakeOffsetX = (Math.random() - 0.5) * shakeIntensity * 0.15;
              shakeOffsetY = (Math.random() - 0.5) * shakeIntensity * 0.15;
            }

            let targetRadius = zoomRadiusRef.current;
            if (viewMode === 'solarsystem') {
              const dest = new THREE.Vector3(0, targetRadius * 0.5, targetRadius);
              camera.position.lerp(dest, 0.05);
              camera.lookAt(0, 0, 0);
            } else if (cameraTarget && viewMode === 'earth') {
              const dest = latLonToVector3(cameraTarget.lat, cameraTarget.lon, cameraTarget.zoom);
              camera.position.lerp(dest, 0.05);
              camera.lookAt(0, 0, 0);
            } else {
              const dest = new THREE.Vector3(0, 0, targetRadius);
              camera.position.lerp(dest, 0.05);
              camera.lookAt(0, 0, 0);
            }

            camera.position.x += shakeOffsetX;
            camera.position.y += shakeOffsetY;

            if (viewMode === 'earth') {
              if (!isDragging) {
                // Apply rotation inertia physics
                globeGroup.rotation.y += rotationVelocityY * adjustedDelta;
                globeGroup.rotation.x += rotationVelocityX * adjustedDelta;
                rotationVelocityY *= Math.pow(0.95, adjustedDelta);
                rotationVelocityX *= Math.pow(0.95, adjustedDelta);
                
                // Slow continuous auto-rotation
                globeGroup.rotation.y += 0.03 * adjustedDelta;
              }

              if (activeLayers.aviation) {
                planes.forEach((p) => {
                  p.progress += p.speed * adjustedDelta * 0.1;
                  if (p.progress > 1) p.progress = 0;
                  p.mesh.position.copy(p.curve.getPointAt(p.progress));
                });
              }

              if (activeLayers.space) {
                satellites.forEach((sat) => {
                  sat.angle += sat.speed * adjustedDelta * 0.1;
                  const x = sat.radius * Math.cos(sat.angle);
                  const y = sat.radius * Math.sin(sat.angle);
                  const pos = new THREE.Vector3(x, y, 0).applyAxisAngle(sat.axis, sat.angle);
                  sat.mesh.position.copy(pos);
                });
              }

              if (activeLayers.weather || activeLayers.geology) {
                anomalies.forEach((a) => {
                  a.scale += a.speed * adjustedDelta * 0.5 * a.pulseDir;
                  if (a.scale > a.maxScale) a.pulseDir = -1;
                  else if (a.scale < 0.1) { a.pulseDir = 1; a.scale = 0.1; }
                  a.mesh.scale.set(a.scale, a.scale, 1);
                  
                  const mat = a.mesh.material;
                  mat.opacity = Math.max(0, 0.8 * (1 - a.scale / a.maxScale));
                });
              }
            }

            if (viewMode === 'solarsystem') {
              if (!isDragging) {
                solarGroup.rotation.y += rotationVelocityY * 0.5 * adjustedDelta;
                rotationVelocityY *= Math.pow(0.95, adjustedDelta);
              }
              
              sunMesh.rotation.y += 0.01 * adjustedDelta;

              // Animate all 8 planets smoothly
              planetMeshes.forEach((pm) => {
                pm.angle += pm.data.speed * adjustedDelta * 0.2;
                const px = pm.data.radius * Math.cos(pm.angle);
                const pz = pm.data.radius * Math.sin(pm.angle);
                pm.group.position.set(px, 0, pz);
                pm.mesh.rotation.y += 0.08 * adjustedDelta;

                if (pm.moonMesh) {
                  moonOrbitAngle += 0.22 * adjustedDelta;
                  pm.moonMesh.position.x = 0.24 * Math.cos(moonOrbitAngle);
                  pm.moonMesh.position.z = 0.24 * Math.sin(moonOrbitAngle);
                }
              });
            }

            renderer.render(scene, camera);
            camera.position.x -= shakeOffsetX;
            camera.position.y -= shakeOffsetY;
          };

          animate();

          const handleResize = () => {
            if (!containerRef.current || !rendererRef.current) return;
            camera.aspect = containerRef.current.clientWidth / containerRef.current.clientHeight;
            camera.updateProjectionMatrix();
            rendererRef.current.setSize(containerRef.current.clientWidth, containerRef.current.clientHeight);
          };

          window.addEventListener('resize', handleResize);

          return () => {
            domEl.removeEventListener('mousedown', handleMouseDown);
            domEl.removeEventListener('mousemove', handleMouseMove);
            domEl.removeEventListener('mouseup', handleMouseUp);
            domEl.removeEventListener('wheel', handleWheel);
            window.removeEventListener('resize', handleResize);
            if (rendererRef.current) {
              if (rendererRef.current.domElement) {
                rendererRef.current.domElement.remove();
              }
              rendererRef.current.dispose();
            }
            innerSphereGeo.dispose();
            innerSphereMat.dispose();
            gridGeo.dispose();
            gridMat.dispose();
            pointsGeo.dispose();
            pointsMat.dispose();
            cityGeo.dispose();
            cityMat.dispose();
            sensorGeo.dispose();
            planeGeo.dispose();
            planeMat.dispose();
            satGeo.dispose();
            satMat.dispose();
            sunGeo.dispose();
            sunMat.dispose();
            materialsToDispose.forEach((mat) => mat.dispose());
          };
        }, [activeLayers, timeScale, viewMode, cameraTarget, shakeIntensity, selectedYear, onSelectSensor]);

        return React.createElement('div', { ref: containerRef, className: 'w-full h-full relative', style: { minHeight: '400px' } });
      };
